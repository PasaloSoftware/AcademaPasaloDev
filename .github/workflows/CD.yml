name: CD — Deploy

on:
  workflow_run:
    workflows: ["CI — Build & Push"]
    types:
      - completed
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch / ambiente a desplegar"
        required: true
        type: choice
        options:
          - main
          - develop
      image_tag:
        description: "Image tag exacto (ej: main-a1b2c3d)"
        required: true
        type: string

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Resolve trigger context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}"       >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
            echo "trigger=manual"                                  >> $GITHUB_OUTPUT
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            echo "branch=${BRANCH}"                               >> $GITHUB_OUTPUT
            echo "image_tag=${BRANCH}-${SHA}"                     >> $GITHUB_OUTPUT
            echo "trigger=automatic"                              >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.branch }}

      - name: Determine environment
        id: env
        run: |
          BRANCH="${{ steps.ctx.outputs.branch }}"
          if [ "$BRANCH" = "main" ]; then
            echo "infisical_env=production"                >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.prod.yml"    >> $GITHUB_OUTPUT
            echo "nginx_conf=nginx.prod.conf"              >> $GITHUB_OUTPUT
            echo "deploy_dir=/home/ubuntu/academia-pasalo" >> $GITHUB_OUTPUT
            echo "is_prod=true"                            >> $GITHUB_OUTPUT
          else
            echo "infisical_env=development"               >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.dev.yml"     >> $GITHUB_OUTPUT
            echo "nginx_conf=nginx.dev.conf"               >> $GITHUB_OUTPUT
            echo "deploy_dir=/home/ubuntu/academia-pasalo" >> $GITHUB_OUTPUT
            echo "is_prod=false"                           >> $GITHUB_OUTPUT
          fi

      - name: Load secrets from Infisical
        uses: Infisical/secrets-action@v1.0.12
        with:
          method: "universal"
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: ${{ steps.env.outputs.infisical_env }}
          project-slug: "academia-pasalo"
          export-type: env

      # ──────────────────────────────────────────────────────────────
      # Valida que el EC2 esté en estado 'running' antes de continuar.
      # Solo aplica para deploy a develop. Si está stopped/pending/etc,
      # falla inmediato con mensaje claro en lugar de colgar en SSH.
      # Requiere: AWS_ACCESS_KEY_ID y AWS_SECRET_ACCESS_KEY en secrets
      # (ya disponibles — los usa EC2.yml).
      # ──────────────────────────────────────────────────────────────
      - name: Check EC2 is running (dev only)
        if: steps.ctx.outputs.branch == 'develop'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          INSTANCE_ID="i-075c22a8bf3645192"
          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)
          echo "EC2 state: $STATE"
          if [ "$STATE" != "running" ]; then
            echo "❌ EC2 no está disponible (estado: $STATE)."
            echo "   Iniciá la instancia desde Actions → 'Turn On/Off EC2' → start"
            echo "   y volvé a correr este workflow cuando esté en 'running'."
            exit 1
          fi
          echo "✅ EC2 está running — continuando con el deploy."

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          BRANCH="${{ steps.ctx.outputs.branch }}"
          if [ "$BRANCH" = "main" ]; then
            echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
            ssh-keyscan -T 30 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          else
            echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
            ssh-keyscan -T 30 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/deploy_key

      - name: Set deploy host
        id: host
        run: |
          BRANCH="${{ steps.ctx.outputs.branch }}"
          if [ "$BRANCH" = "main" ]; then
            echo "value=${{ secrets.VPS_HOST }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ secrets.EC2_HOST }}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare deploy directory on server
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ steps.host.outputs.value }} "
            mkdir -p ${{ steps.env.outputs.deploy_dir }}
            sudo mkdir -p /opt/academia/secrets /opt/academia/uploads
            sudo chown ubuntu:ubuntu /opt/academia/secrets /opt/academia/uploads
            sudo chmod 700 /opt/academia/secrets
            sudo chmod 777 /opt/academia/uploads
          "

      - name: Copy compose and nginx files via SCP
        run: |
          scp -i ~/.ssh/deploy_key \
            ops/compose/${{ steps.env.outputs.compose_file }} \
            ubuntu@${{ steps.host.outputs.value }}:${{ steps.env.outputs.deploy_dir }}/docker-compose.yml

          scp -i ~/.ssh/deploy_key \
            ops/nginx/${{ steps.env.outputs.nginx_conf }} \
            ubuntu@${{ steps.host.outputs.value }}:${{ steps.env.outputs.deploy_dir }}/nginx.conf

          if [ "${{ steps.ctx.outputs.branch }}" = "main" ]; then
            scp -i ~/.ssh/deploy_key \
              ops/monitoring/prometheus.yml \
              ubuntu@${{ steps.host.outputs.value }}:${{ steps.env.outputs.deploy_dir }}/prometheus.yml
          fi

      - name: Write Google Drive SA JSON
        env:
          GOOGLE_DRIVE_SA_JSON: ${{ env.GOOGLE_DRIVE_SA_JSON }}
        run: |
          if [ -z "$GOOGLE_DRIVE_SA_JSON" ]; then
            echo "❌ GOOGLE_DRIVE_SA_JSON está vacío"
            exit 1
          fi
          printf '%s' "$GOOGLE_DRIVE_SA_JSON" \
            | base64 | tr -d '\n' \
            | ssh -i ~/.ssh/deploy_key ubuntu@${{ steps.host.outputs.value }} "
              base64 -d > /opt/academia/secrets/google-drive-sa.json
              chmod 644 /opt/academia/secrets/google-drive-sa.json
            "

      - name: Write mysql-exporter config (prod only)
        if: steps.ctx.outputs.branch == 'main'
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ steps.host.outputs.value }} "
            cat > ${{ steps.env.outputs.deploy_dir }}/mysql-exporter.cnf << 'EOF'
          [client]
          user=academia
          password=${{ env.DB_PASSWORD }}
          host=mysql
          port=3306
          EOF
          "

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ steps.host.outputs.value }} "
            set -Eeuo pipefail
            cd ${{ steps.env.outputs.deploy_dir }}

            echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin

            cat > .env << 'EOF'
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          IMAGE_TAG=${{ steps.ctx.outputs.image_tag }}
          DB_HOST=${{ env.DB_HOST }}
          DB_PORT=${{ env.DB_PORT }}
          DB_USER=${{ env.DB_USER }}
          DB_PASSWORD=${{ env.DB_PASSWORD }}
          DB_NAME=${{ env.DB_NAME }}
          JWT_SECRET=${{ env.JWT_SECRET }}
          GOOGLE_CLIENT_ID=${{ env.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ env.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI=${{ env.GOOGLE_REDIRECT_URI }}
          MAXMIND_LICENSE_KEY=${{ env.MAXMIND_LICENSE_KEY }}
          CORS_ORIGINS=${{ env.CORS_ORIGINS }}
          GOOGLE_DRIVE_ROOT_FOLDER_ID=${{ env.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          GOOGLE_DRIVE_REAL_ROOT_FOLDER_ID=${{ env.GOOGLE_DRIVE_REAL_ROOT_FOLDER_ID }}
          STORAGE_PROVIDER=${{ env.STORAGE_PROVIDER }}
          GOOGLE_WORKSPACE_ADMIN_EMAIL=${{ env.GOOGLE_WORKSPACE_ADMIN_EMAIL }}
          GOOGLE_WORKSPACE_GROUP_DOMAIN=${{ env.GOOGLE_WORKSPACE_GROUP_DOMAIN }}
          GOOGLE_WORKSPACE_STAFF_VIEWERS_GROUP_EMAIL=${{ env.GOOGLE_WORKSPACE_STAFF_VIEWERS_GROUP_EMAIL }}
          GRAFANA_PASSWORD=${{ env.GRAFANA_PASSWORD }}
          EOF

            docker compose -p academia-pasalo --env-file .env pull
            docker compose -p academia-pasalo --env-file .env down --remove-orphans
            docker compose -p academia-pasalo --env-file .env up -d

            rm -f .env
            docker image prune -f
          "

      - name: Run SQL seed (dev only)
        if: steps.ctx.outputs.branch == 'develop'
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ steps.host.outputs.value }} "
            set -Eeuo pipefail
            echo 'Esperando MySQL...'
            for i in \$(seq 1 30); do
              if docker exec academia-pasalo-mysql mysqladmin ping -h localhost -u root -p'${{ env.DB_PASSWORD }}' --silent 2>/dev/null; then
                echo '✅ MySQL disponible'
                break
              fi
              sleep 3
            done
            echo 'Ejecutando SQL seed...'
            docker exec academia-pasalo-backend node dist/scripts/academy-real/run-academy-real-sql.js
            echo '✅ SQL seed completado'
          "

      - name: Wait for backend healthcheck
        run: |
          echo "Esperando que el backend esté disponible..."
          for i in $(seq 1 20); do
            if ssh -i ~/.ssh/deploy_key ubuntu@${{ steps.host.outputs.value }} \
              "curl -sf http://localhost/api/v1/health > /dev/null 2>&1"; then
              echo "✅ Backend disponible"
              exit 0
            fi
            echo "Intento $i/20 — esperando 10s..."
            sleep 10
          done
          echo "❌ Backend no responde después de 200s"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ Deploy falló — ejecutando rollback..."
          ssh -i ~/.ssh/deploy_key ubuntu@${{ steps.host.outputs.value }} "
            cd ${{ steps.env.outputs.deploy_dir }}
            docker compose -p academia-pasalo down --remove-orphans || true
            echo '❌ Rollback ejecutado — revisá los logs manualmente'
            docker ps -a
          " || true