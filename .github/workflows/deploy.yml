name: Deploy
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  validate-ec2-status:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Validate status
        run: |
          INSTANCE_ID="i-075c22a8bf3645192"
          echo "Checking instance state..."
          STATE=$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" --query "Reservations[0].Instances[0].State.Name" --output text)
          echo "Current state: $STATE"
          if [ "$STATE" = "stopped" ]; then
            echo "EC2 Instance must be ON in order to make the DEPLOY"
            exit 1
          fi
          echo "EC2 Instance is running"

  build-and-push:
    needs: [validate-ec2-status]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/academia-pasalo-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/academia-pasalo-backend:${{ github.sha }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/academia-pasalo-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/academia-pasalo-frontend:${{ github.sha }}
  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: academia
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          STORAGE_PROVIDER: GDRIVE
          GITHUB_REPOSITORY: ${{ github.repository }}
          GOOGLE_WORKSPACE_ADMIN_EMAIL: ${{ secrets.GOOGLE_WORKSPACE_ADMIN_EMAIL }}
          GOOGLE_WORKSPACE_GROUP_DOMAIN: ${{ secrets.GOOGLE_WORKSPACE_GROUP_DOMAIN }}
          GOOGLE_WORKSPACE_STAFF_VIEWERS_GROUP_EMAIL: ${{ secrets.GOOGLE_WORKSPACE_STAFF_VIEWERS_GROUP_EMAIL }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: DOCKER_USERNAME,DOCKER_PASSWORD,DB_NAME,DB_USER,GOOGLE_CLIENT_ID,GOOGLE_REDIRECT_URI,CORS_ORIGINS,GOOGLE_DRIVE_ROOT_FOLDER_ID,STORAGE_PROVIDER,GITHUB_REPOSITORY,GOOGLE_WORKSPACE_ADMIN_EMAIL,GOOGLE_WORKSPACE_GROUP_DOMAIN,GOOGLE_WORKSPACE_STAFF_VIEWERS_GROUP_EMAIL,GRAFANA_PASSWORD
          script: |
            set -Eeuo pipefail
            APP_DIR="/home/ubuntu/academia-pasalo"
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone "https://github.com/${GITHUB_REPOSITORY}.git" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin
            git reset --hard origin/main
            bash ops/scripts/deploy.sh