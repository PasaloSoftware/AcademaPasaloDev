services:
  nginx:
    image: nginx:alpine
    container_name: academia-pasalo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - academia-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    image: ${DOCKER_USERNAME}/academia-pasalo-backend:${IMAGE_TAG}
    container_name: academia-pasalo-backend
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/google-drive-sa.json
      - API_PREFIX=api/v1
      - NODE_ENV=production
      - PORT=3001
      - GOOGLE_DRIVE_ROOT_FOLDER_ID=${GOOGLE_DRIVE_ROOT_FOLDER_ID}
      - GOOGLE_DRIVE_REAL_ROOT_FOLDER_ID=${GOOGLE_DRIVE_REAL_ROOT_FOLDER_ID}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER}
      - GOOGLE_WORKSPACE_ADMIN_EMAIL=${GOOGLE_WORKSPACE_ADMIN_EMAIL}
      - GOOGLE_WORKSPACE_GROUP_DOMAIN=${GOOGLE_WORKSPACE_GROUP_DOMAIN}
      - GOOGLE_WORKSPACE_STAFF_VIEWERS_GROUP_EMAIL=${GOOGLE_WORKSPACE_STAFF_VIEWERS_GROUP_EMAIL}
    volumes:
      - /opt/academia/secrets/google-drive-sa.json:/run/secrets/google-drive-sa.json:ro
      - /opt/academia/uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - academia-network

  frontend:
    image: ${DOCKER_USERNAME}/academia-pasalo-frontend:${IMAGE_TAG}
    container_name: academia-pasalo-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    networks:
      - academia-network

  mysql:
    image: mysql:8.0
    container_name: academia-pasalo-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    expose:
      - "3306"
    networks:
      - academia-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.0-alpine
    container_name: academia-pasalo-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - academia-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: academia-pasalo-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.path=/prometheus'
    expose:
      - "9090"
    networks:
      - academia-network

  grafana:
    image: grafana/grafana:12.0.0
    container_name: academia-pasalo-grafana
    restart: unless-stopped
    expose:
      - "3002"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3002
      - GF_SERVER_ROOT_URL=https://academiapasalo.com/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_PROTOCOL=http
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - academia-network

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: academia-pasalo-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - "9100"
    networks:
      - academia-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.80.1
    container_name: academia-pasalo-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    expose:
      - "9121"
    depends_on:
      - redis
    networks:
      - academia-network

  mysql-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: academia-pasalo-mysql-exporter
    restart: unless-stopped
    command:
      - '--config.my-cnf=/etc/mysql/my.cnf'
    volumes:
      - ./mysql-exporter.cnf:/etc/mysql/my.cnf:ro
    expose:
      - "9104"
    networks:
      - academia-network
  certbot:
    image: certbot/certbot:v3.3.0
    container_name: academia-pasalo-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >-
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    networks:
      - academia-network

networks:
  academia-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  certbot_www:
    driver: local
  certbot_certs:
    driver: local
  redis_data:
    driver: local
  mysql_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local